<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta property="og:image" content="https://i.ibb.co/M8S0Zzj/live-streaming.png" itemprop="thumbnailUrl">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{heading}</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        :root {{
            --bg-main: #0a0a0d;
            --accent-color: #e50914; /* Premium Netflix Red */
            --text-main: #ffffff;
            --text-muted: #73737d;
        }}
        
        html, body {{
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main); overflow-x: hidden;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
            -webkit-font-smoothing: antialiased;
        }}

        /* Header Alignment in Natural Flow */
        header {{
            width: 100%; padding: 30px 20px 10px 20px; box-sizing: border-box; display: flex; justify-content: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); z-index: 10;
        }}

        #file-name {{
            font-size: 1.2rem; font-weight: 600; text-align: center; max-width: 85%;
            color: var(--text-main); line-height: 1.4;
            letter-spacing: -0.3px; word-break: break-word;
        }}

        @media (max-width: 768px) {{
            #file-name {{ font-size: 1rem; }}
        }}

        /* Container positioned perfectly right below the file name */
        .container {{
            width: 100%; max-width: 960px; padding: 15px 20px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
        }}

        .player-wrapper {{
            width: 100%; background-color: #000; border-radius: 12px; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 1px rgba(255,255,255,0.08); aspect-ratio: 16/9;
            margin-bottom: 25px;
        }}

        /* Premium Standalone Download Button Styles */
        .download-btn {{
            display: inline-flex; align-items: center; justify-content: center;
            background-color: var(--accent-color); color: #ffffff; text-decoration: none;
            padding: 14px 40px; font-size: 0.95rem; font-weight: 700; border-radius: 30px;
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.4); transition: transform 0.2s ease, background-color 0.2s ease;
            margin-bottom: 20px; letter-spacing: 0.5px; text-transform: uppercase;
        }}

        .download-btn:hover {{
            background-color: #b80710; transform: translateY(-2px);
        }}

        .download-btn:active {{
            transform: translateY(0);
        }}

        /* Sleek Notification Footer */
        footer {{
            width: 100%; padding: 20px; box-sizing: border-box; display: flex; justify-content: center; margin-top: auto;
        }}

        .alert-box {{
            max-width: 600px; text-align: center; font-size: 0.8rem; line-height: 1.4;
            color: var(--text-muted); background: rgba(255, 255, 255, 0.02);
            padding: 12px 24px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.04);
        }}

        /* Plyr Media Player Custom Skin */
        .plyr {{ font-family: inherit; height: 100%; width: 100%; }}
        .plyr__control--overlaid {{ background: rgba(229, 9, 20, 0.9) !important; }}
        .plyr--video .plyr__control:hover {{ background: var(--accent-color) !important; color: #fff !important; }}
        
        /* Strict CSS to completely hide the sliding range input panel for volume */
        .plyr__volume input[type=range] {{
            display: none !important;
        }}
    </style>
</head>
<body>

    <header>
        <div id="file-name">{file_name}</div>
    </header>

    <div class="container">
        <div class="player-wrapper">
            <{tag} src="{src}" class="player" controls playsinline></{tag}>
        </div>
        
        <a href="{src}" class="download-btn">⬇️ Download Video</a>
    </div>

    <footer>
        <div class="alert-box">
            💡 <b>Playback Issue?</b> If the video fails to play, your browser might lack native codec support (e.g., MKV/HEVC). Please download the file directly.
        </div>
    </footer>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {{
            // 'mute' is added back for button control, while 'volume' slider remains omitted
            const controls = [
                'play-large', 'play', 'mute', 'progress', 'current-time', 'duration', 'fullscreen'
            ];
            const player = new Plyr('.player', {{ 
                controls,
                ratio: '16:9'
            }});
        }});
    </script>
</body>
</html>
