<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta property="og:image" content="https://i.ibb.co/M8S0Zzj/live-streaming.png" itemprop="thumbnailUrl">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{heading}</title>
    <link rel="stylesheet" type="text/css" href="/static/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
</head>

<body>
    <header>
        <div class="toogle" onclick="toggleMode()"></div>
        <div id="file-name">
            {file_name}
        </div>
    </header>

    <div class="container">
        <{tag} src="{src}" class="player" controls playsinline></{tag}>
    </div>

    <footer>
        <p style="text-align: center; font-size: 0.9rem; margin: 5px 0;">
            ⚠️ वीडियो प्ले नहीं हो रहा? ब्राउज़र या प्लेयर कोडक (Codec) का समर्थन नहीं कर रहा होगा। कृपया सीधे डाउनलोड करके देखें।
        </p>
    </footer>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        // Plyr प्लेयर कंट्रोल्स कॉन्फ़िगरेशन
        const controls = [
            'play-large',
            'rewind',
            'play', 
            'fast-forward', 
            'progress', 
            'current-time',
            'duration',
            'mute',
            'volume',
            'settings',
            'download',
            'fullscreen'
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const player = new Plyr('.player', { controls });
        });

        // लाइव लाइट/डार्क मोड स्विचिंग स्क्रिप्ट
        function toggleMode() {
            const body = document.body;
            if (body.classList.contains('dark')) {
                body.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        // ब्राउज़र रिफ्रेश होने पर पिछला थीम याद रखने के लिए
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
        }
    </script>
</body>
</html>
