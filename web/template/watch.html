<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta property="og:image" content="https://i.ibb.co/M8S0Zzj/live-streaming.png" itemprop="thumbnailUrl">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{heading}</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        :root {{
            --bg-main: #0a0a0d;
            --accent-color: #e50914; /* Premium Netflix Red */
            --text-main: #ffffff;
            --text-muted: #73737d;
        }}
        
        html, body {{
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main); overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            -webkit-font-smoothing: antialiased;
        }}

        /* Transparent Blurred Minimal Header */
        header {{
            width: 100%; padding: 25px 20px; box-sizing: border-box; display: flex; justify-content: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); z-index: 10;
        }}

        #file-name {{
            font-size: 1.2rem; font-weight: 600; text-align: center; max-width: 85%;
            color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            letter-spacing: -0.3px;
        }}

        @media (max-width: 768px) {{
            #file-name {{ font-size: 0.95rem; white-space: normal; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }}
        }}

        /* Responsive Player Container */
        .container {{
            width: 100%; max-width: 960px; padding: 0 20px; box-sizing: border-box;
            display: flex; justify-content: center; align-items: center; flex-grow: 1;
        }}

        .player-wrapper {{
            width: 100%; background-color: #000; border-radius: 12px; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 1px rgba(255,255,255,0.08); aspect-ratio: 16/9;
        }}

        /* Sleek Notification Footer */
        footer {{
            width: 100%; padding: 25px 20px; box-sizing: border-box; display: flex; justify-content: center; z-index: 10;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
        }}

        .alert-box {{
            max-width: 600px; text-align: center; font-size: 0.8rem; line-height: 1.4;
            color: var(--text-muted); background: rgba(255, 255, 255, 0.02);
            padding: 12px 24px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }}

        /* Plyr Media Player Custom Skin */
        .plyr {{ font-family: inherit; height: 100%; width: 100%; }}
        .plyr__control--overlaid {{ background: rgba(229, 9, 20, 0.9) !important; }}
        .plyr--video .plyr__control:hover {{ background: var(--accent-color) !important; color: #fff !important; }}
    </style>
</head>
<body>

    <header>
        <div id="file-name">{file_name}</div>
    </header>

    <div class="container">
        <div class="player-wrapper">
            <{tag} src="{src}" class="player" controls playsinline></{tag}>
        </div>
    </div>

    <footer>
        <div class="alert-box">
            💡 <b>Playback Issue?</b> If the video fails to play, your browser might lack native codec support (e.g., MKV/HEVC). Please download the file directly.
        </div>
    </footer>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {{
            const controls = [
                'play-large', 'rewind', 'play', 'fast-forward', 
                'progress', 'current-time', 'duration', 
                'mute', 'volume', 'settings', 'download', 'fullscreen'
            ];
            const player = new Plyr('.player', {{ 
                controls,
                ratio: '16:9'
            }});
        }});
    </script>
</body>
</html>
